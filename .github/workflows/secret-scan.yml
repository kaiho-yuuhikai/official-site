name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR では merge-base からの差分も検査できるよう履歴を取得
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 全 tracked ファイルをスキャン
        id: scan-all
        run: node scripts/check-secrets.mjs --all-tracked

      - name: PR 差分のみを追加スキャン (PR の場合)
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Scanning diff: ${BASE_SHA}..${HEAD_SHA}"
          node scripts/check-secrets.mjs --ref "${BASE_SHA}..${HEAD_SHA}"
