name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 毎日 9:00 JST (0:00 UTC) に note RSS を取得して再デプロイ
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # note.com RSS を取得して JSON に保存
      - name: Fetch note RSS
        run: node scripts/fetch-note-rss.mjs

      # RSS データが更新されていたらコミット（schedule/dispatch時のみ）
      - name: Commit RSS data if changed
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/note-articles.json
          git diff --cached --quiet || git commit -m "chore: note RSS データを自動更新"
          git push || true

      - run: npx nuxt generate

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - id: deployment
        uses: actions/deploy-pages@v4
